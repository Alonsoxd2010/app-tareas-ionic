<ion-content>
  <app-header></app-header>
  <app-logo></app-logo>
  <h2 class="ion-text-center ion-no-margin">Login</h2>
  <div class="content">
    <div class="d-flex-center">
      <form (keyup.enter)="submit()" (ngSubmit)="submit()" class="ion-text-center">
        <app-custom-input label="Email" icon="mail-outline" type="email" autocomplete="email"
          [control]="form.controls.email">
        </app-custom-input>
        <div class="validators" *ngIf="form.controls.email.errors && form.controls.email.dirty">
          <div *ngIf="form.controls.email.errors?.['required']">Por favor ingrese el email</div>
          <div *ngIf="form.controls.email.errors?.['email']">Por favor ingrese un email válido</div>
        </div>
        <app-custom-input label="Password" icon="lock-closed-outline" type="password" autocomplete="current-password"
          [isPassword]="true" [control]="form.controls.password">
        </app-custom-input>
        <div class="validators" *ngIf="form.controls.password.errors && form.controls.password.dirty">
          <div *ngIf="form.controls.password.errors?.['required']">Por favor ingrese la contraseña</div>
        </div>
        <ion-button class="ion-margin-vertical" type="submit" shape="round" [disabled]="!form.valid">Acceder
          <ion-icon slot="end" name="log-in-outline"></ion-icon>
        </ion-button>
        <div class="sign-up">
          <div id="palabras" >¿No tienes una cuenta?</div>
          <ion-button routerLink="/sign-up" shape="round">
            Regístrate <ion-icon slot="end" name="person-add-outline"></ion-icon>
          </ion-button>
        </div>
      </form>
    </div>

  </div>
</ion-content>
